name: CI

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

env:
  # Pinned revision of Xenova/all-MiniLM-L6-v2. Bump together with any model
  # change; the model cache key includes it, so bumping invalidates the cache.
  HF_MODEL_REVISION: 751bff37182d3f1213fa05d7196b954e230abad9

jobs:
  static-checks:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
    - name: Checkout code
      uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

    - name: Setup Node.js
      uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
      with:
        node-version-file: '.nvmrc'

    - name: Install pnpm
      # Version is taken from the `packageManager` field in package.json.
      uses: pnpm/action-setup@02f6c237bd2518259fed6c71566509edfb3f2b74 # v4

    - name: Install dependencies
      run: pnpm install --frozen-lockfile

    - name: Lint check
      run: pnpm run lint

    - name: Format check
      run: pnpm run format:check

    - name: Type check
      run: pnpm run build

  # Single owner of the external (HuggingFace) dependency. Downloads the model
  # files once and publishes them via the GitHub Actions cache, so the test
  # jobs below never touch the network — keeping flakiness to this one job.
  # The model files are OS-independent, so one cross-OS cache serves all runners.
  prepare-models:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

    - name: Setup Node.js
      uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
      with:
        node-version-file: '.nvmrc'

    - name: Restore model cache
      id: cache
      uses: actions/cache/restore@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
      with:
        path: tmp/models
        key: hf-model-allMiniLM-${{ env.HF_MODEL_REVISION }}
        enableCrossOsArchive: true

    # Pure file download (node: builtins + global fetch), so no pnpm install is
    # needed. fp32 (model.onnx) serves the CPU tests; fp16 (model_fp16.onnx)
    # serves the WebGPU tests. We never create an inference session here.
    - name: Download model files (fp32 + fp16)
      if: steps.cache.outputs.cache-hit != 'true'
      run: |
        node scripts/prewarm-embedder-cache.mjs fp32
        node scripts/prewarm-embedder-cache.mjs fp16

    - name: Save model cache
      if: steps.cache.outputs.cache-hit != 'true'
      uses: actions/cache/save@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
      with:
        path: tmp/models
        key: hf-model-allMiniLM-${{ env.HF_MODEL_REVISION }}
        enableCrossOsArchive: true

  test:
    needs: prepare-models
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
    runs-on: ${{ matrix.os }}

    env:
      # Node honours TZ on every platform, so this replaces the Linux-only
      # `timedatectl` step and keeps test behaviour consistent across runners.
      TZ: Asia/Tokyo

    steps:
    - name: Checkout code
      uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

    - name: Setup Node.js
      uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
      with:
        node-version-file: '.nvmrc'

    - name: Install pnpm
      # Version is taken from the `packageManager` field in package.json.
      uses: pnpm/action-setup@02f6c237bd2518259fed6c71566509edfb3f2b74 # v4

    - name: Install dependencies
      run: pnpm install --frozen-lockfile

    # Populated by prepare-models; restore-only, so tests never hit the network.
    - name: Restore model cache
      uses: actions/cache/restore@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
      with:
        path: tmp/models
        key: hf-model-allMiniLM-${{ env.HF_MODEL_REVISION }}
        enableCrossOsArchive: true

    - name: Run tests
      run: pnpm test

  webgpu-main-path:
    needs: prepare-models
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
    runs-on: ${{ matrix.os }}

    env:
      TZ: Asia/Tokyo

    steps:
    - name: Checkout code
      uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

    - name: Setup Node.js
      uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
      with:
        node-version-file: '.nvmrc'

    - name: Install pnpm
      # Version is taken from the `packageManager` field in package.json.
      uses: pnpm/action-setup@02f6c237bd2518259fed6c71566509edfb3f2b74 # v4

    - name: Install dependencies
      run: pnpm install --frozen-lockfile

    - name: Install Vulkan SDK and Software Rasterizer
      uses: jakoch/install-vulkan-sdk-action@b394a1abed9cb019d8e637eeadac93d73e0853da # v1.5.5
      with:
        install_runtime: true
        install_swiftshader: ${{ runner.os == 'Windows' }}
        install_lavapipe: ${{ runner.os == 'Linux' }}

    - name: Install Vulkan Dependencies (Ubuntu)
      if: runner.os == 'Linux'
      run: |
        sudo apt-get update
        sudo apt-get install -y libvulkan1 vulkan-tools libwayland-client0 mesa-vulkan-drivers

    - name: Verify Vulkan
      run: vulkaninfo --summary

    # Populated by prepare-models; restore-only, so tests never hit the network.
    - name: Restore model cache
      uses: actions/cache/restore@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
      with:
        path: tmp/models
        key: hf-model-allMiniLM-${{ env.HF_MODEL_REVISION }}
        enableCrossOsArchive: true

    - name: Run WebGPU main path tests
      env:
        # WebGPU benefits from lower-precision model weights; fp32 is kept as
        # the default for normal CPU tests.
        RAG_DTYPE: fp16
        # Direct Dawn to use Vulkan (rather than D3D12) on Windows, so
        # SwiftShader/Lavapipe can serve as the adapter.
        WGPU_BACKEND: vulkan
        VK_ICD_FILENAMES: ${{ runner.os == 'Windows' && 'C:\SwiftShader\vk_swiftshader_icd.json' || '/usr/share/vulkan/icd.d/lvp_icd.json' }}
      run: pnpm run test:webgpu:main-path

  # Install the packed tarball in isolation and load its full production import
  # graph using only declared `dependencies`. Guards against a production module
  # importing an undeclared/dev-only dependency (which would crash a consumer's
  # `npx` install) and against packaging changes that break module resolution.
  package-smoke:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

    - name: Setup Node.js
      uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
      with:
        node-version-file: '.nvmrc'

    - name: Install pnpm
      # Version is taken from the `packageManager` field in package.json.
      uses: pnpm/action-setup@02f6c237bd2518259fed6c71566509edfb3f2b74 # v4

    - name: Install dependencies
      run: pnpm install --frozen-lockfile

    - name: Build
      run: pnpm run build

    - name: Smoke-test the published package in isolation
      # The CPU native binary is bundled; skip onnxruntime-node's postinstall,
      # which otherwise downloads CUDA EP binaries from NuGet (flaky on CI).
      env:
        ONNXRUNTIME_NODE_INSTALL: skip
      run: |
        pnpm pack --pack-destination "${RUNNER_TEMP}"
        SMOKE_DIR="$(mktemp -d)"
        cd "$SMOKE_DIR"
        npm init -y >/dev/null
        npm install "${RUNNER_TEMP}"/mcp-local-rag-*.tgz
        node "${GITHUB_WORKSPACE}/scripts/smoke-published-package.mjs" "$SMOKE_DIR"

  # Stable aggregate check. The `main` ruleset requires a status named `ci`,
  # so this job keeps that name regardless of the test matrix dimensions.
  ci:
    needs: [static-checks, prepare-models, test, webgpu-main-path, package-smoke]
    if: always()
    runs-on: ubuntu-latest
    steps:
    - name: Verify the test matrix succeeded
      if: needs.static-checks.result != 'success' || needs.prepare-models.result != 'success' || needs.test.result != 'success' || needs.webgpu-main-path.result != 'success' || needs.package-smoke.result != 'success'
      run: exit 1
